<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAMS Power | Inventory & Billing System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      /* গ্লোবাল ফন্ট ফ্যামিলি সেটআপ */
      * {
        font-family: 'Hind Siliguri', sans-serif;
        transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* স্ক্রলবার মডার্ন লুক দেওয়ার জন্য */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; /* soft slate scrollbar */
        border-radius: 8px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* এনিমেশন ইফেক্ট */
      .fade-in {
        animation: fadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* মডার্ন ইন্টারেক্টিভ ক্লাসসমূহ */
      .hover-scale {
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, border-color 0.25s ease !important;
      }
      .hover-scale:hover {
        transform: translateY(-3px) scale(1.015);
        box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.03) !important;
      }
      .hover-scale:active {
        transform: translateY(0) scale(0.985);
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(241, 245, 249, 0.9);
      }

      .pulse-soft {
        animation: pulseSoft 2.5s infinite ease-in-out;
      }
      @keyframes pulseSoft {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(0.98); }
      }

      /* ইনপুট, ড্রপডাউন এবং টেক্সটএরিয়া সৌন্দর্যকরণ */
      input[type="text"], 
      input[type="number"], 
      input[type="email"], 
      input[type="password"], 
      input[type="date"], 
      input[type="datetime-local"], 
      select, 
      textarea {
        background-color: #f8fafc !important; /* bg-slate-50 */
        border: 1.5px solid #e2e8f0 !important; /* border-slate-200 */
        border-radius: 16px !important; /* custom rounded inputs */
        padding: 0.875rem 1.125rem !important;
        font-weight: 600 !important;
        font-size: 0.875rem !important;
        outline: none !important;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        color: #1e293b !important; /* text-slate-800 */
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02) !important;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #f39c12 !important; /* LAMS Power Orange focus */
        box-shadow: 0 0 0 4px rgba(243, 156, 18, 0.12) !important;
        background-color: #ffffff !important;
      }

      /* কার্ড ডিজাইন সৌন্দর্যকরণ */
      .bg-white {
        border-radius: 28px !important; /* larger modern card radius */
        border: 1px solid #f1f5f9 !important; /* border-slate-100 */
        box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.04), 0 2px 8px -1px rgba(148, 163, 184, 0.02) !important;
      }

      /* টেবিল সৌন্দর্যকরণ */
      table {
        border-collapse: separate !important;
        border-spacing: 0 6px !important; /* row spacing */
      }
      table th {
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.075em !important;
        color: #94a3b8 !important; /* text-slate-400 */
        border-bottom: 2px solid #f1f5f9 !important;
        padding: 1rem 1.25rem !important;
        font-size: 0.65rem !important;
      }
      table td {
        padding: 1.125rem 1.25rem !important;
        border-top: 1px solid #f8fafc !important;
        border-bottom: 1px solid #f8fafc !important;
        background-color: #ffffff;
        font-size: 0.825rem !important;
      }
      table tr {
        transition: transform 0.2s ease, box-shadow 0.2s ease !important;
      }
      table tbody tr:hover td {
        background-color: #f8fafc !important; /* row hover state */
      }

      /* বাটন ডিজাইন সৌন্দর্যকরণ */
      button {
        border-radius: 16px !important;
        font-weight: 800 !important;
        letter-spacing: -0.01em !important;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
      }
      button:hover {
        transform: translateY(-1.5px);
      }
      button:active {
        transform: translateY(0.5px);
      }
      button.bg-slate-900 {
        background-color: #0f172a !important; /* slate-900 */
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1) !important;
      }
      button.bg-slate-900:hover {
        background-color: #f39c12 !important; /* orange hover */
        box-shadow: 0 8px 16px rgba(243, 156, 18, 0.18) !important;
      }
      button.bg-orange-600:hover, button.bg-green-600:hover, button.bg-blue-600:hover {
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08) !important;
      }

      /* SweetAlert পপ-আপের ভেতরে Hind Siliguri ফন্ট নিশ্চিত করার জন্য */
      .swal2-popup, .swal2-title, .swal2-content, .swal2-html-container, .swal2-confirm {
        font-family: 'Hind Siliguri', sans-serif !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 antialiased">
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Date toLocaleDateString Prototype Override (force dd/mm/yy format everywhere)
      Date.prototype.toLocaleDateString = function() {
        const day = String(this.getDate()).padStart(2, '0');
        const month = String(this.getMonth() + 1).padStart(2, '0');
        const year = String(this.getFullYear()).slice(-2);
        return `${day}/${month}/${year}`;
      };

      window.alert = function(message) {
        // মেসেজের ধরনের ওপর ভিত্তি করে আইকন ডাইনামিক করা
        let iconType = 'info';
        let titleText = 'বিজ্ঞপ্তি';

        const lowerMessage = message.toLowerCase();
        
if (lowerMessage.includes('ত্রুটি') || lowerMessage.includes('error') || lowerMessage.includes('দুঃখিত') || lowerMessage.includes('অবৈধ') || lowerMessage.includes('সমস্যা') || lowerMessage.includes('ভুল')) {
          iconType = 'error';
          titleText = 'এরর!';
        } else if (lowerMessage.includes('সফল') || lowerMessage.includes('✅') || lowerMessage.includes('সাকসেস') || lowerMessage.includes('সেভ')) {
          iconType = 'success';
          titleText = 'সফল হয়েছে!';
        } else if (lowerMessage.includes('ইতোমধ্যে') || lowerMessage.includes('বিদ্যমান') || lowerMessage.includes('🔒') || lowerMessage.includes('⚠️') || lowerMessage.includes('মাত্র')) {
          iconType = 'warning';
          titleText = 'সতর্কতা!';
        }

        Swal.fire({
          title: titleText,
          text: message,
          icon: iconType,
          confirmButtonText: 'ঠিক আছে',
          confirmButtonColor: '#2563eb', 
          customClass: {
            popup: 'rounded-[2rem] shadow-xl border border-slate-100'
          }
        });
      };
    </script>
  </body>
</html>
