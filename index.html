<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAMS Power | Inventory & Billing System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      /* গ্লোবাল ফন্ট ফ্যামিলি সেটআপ */
      * {
        font-family: 'Hind Siliguri', sans-serif;
        transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      /* স্ক্রলবার মডার্ন লুক দেওয়ার জন্য */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #f39c12; /* LAMS Power Orange */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d35400;
      }

      /* এনিমেশন ইফেক্ট */
      .fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* মডার্ন ইন্টারেক্টিভ ক্লাসসমূহ */
      .hover-scale {
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      }
      .hover-scale:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.1);
      }
      .hover-scale:active {
        transform: translateY(0) scale(0.99);
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(241, 245, 249, 0.8);
      }

      .pulse-soft {
        animation: pulseSoft 2s infinite ease-in-out;
      }
      @keyframes pulseSoft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      /* SweetAlert পপ-আপের ভেতরে Hind Siliguri ফন্ট নিশ্চিত করার জন্য */
      .swal2-popup, .swal2-title, .swal2-content, .swal2-html-container, .swal2-confirm {
        font-family: 'Hind Siliguri', sans-serif !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 antialiased">
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.alert = function(message) {
        // মেসেজের ধরনের ওপর ভিত্তি করে আইকন ডাইনামিক করা
        let iconType = 'info';
        let titleText = 'বিজ্ঞপ্তি';

        const lowerMessage = message.toLowerCase();
        
if (lowerMessage.includes('ত্রুটি') || lowerMessage.includes('error') || lowerMessage.includes('দুঃখিত') || lowerMessage.includes('অবৈধ') || lowerMessage.includes('সমস্যা') || lowerMessage.includes('ভুল')) {
          iconType = 'error';
          titleText = 'এরর!';
        } else if (lowerMessage.includes('সফল') || lowerMessage.includes('✅') || lowerMessage.includes('সাকসেস') || lowerMessage.includes('সেভ')) {
          iconType = 'success';
          titleText = 'সফল হয়েছে!';
        } else if (lowerMessage.includes('ইতোমধ্যে') || lowerMessage.includes('বিদ্যমান') || lowerMessage.includes('🔒') || lowerMessage.includes('⚠️') || lowerMessage.includes('মাত্র')) {
          iconType = 'warning';
          titleText = 'সতর্কতা!';
        }

        Swal.fire({
          title: titleText,
          text: message,
          icon: iconType,
          confirmButtonText: 'ঠিক আছে',
          confirmButtonColor: '#2563eb', 
          customClass: {
            popup: 'rounded-[2rem] shadow-xl border border-slate-100'
          }
        });
      };
    </script>
  </body>
</html>
