name: Supabase Database Backup

on:
  schedule:
    # প্রতিদিন বাংলাদেশ সময় সকাল ৬টায় (UTC 00:00) ব্যাকআপ নেবে
    - cron: '0 0 * * *'
  workflow_dispatch: # ড্যাশবোর্ড থেকে ম্যানুয়ালি রান করার জন্য বাটন

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # 🔴 v3 থেকে v4 করা হয়েছে

    - name: Set up PostgreSQL client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client

    - name: Generate Backup File
      run: |
        DATE=$(date +'%Y-%m-%d_%H-%M-%S')
        BACKUP_NAME="lams_power_backup_$DATE.sql"
        # সুপাবেজ থেকে ডাটা ডাম্প করা হচ্ছে
        pg_dump "${{ secrets.SUPABASE_DB_URL }}" > $BACKUP_NAME
        echo "BACKUP_FILE=$BACKUP_NAME" >> $GITHUB_ENV

    - name: Upload Backup as Artifact
      uses: actions/upload-artifact@v4 # 🔴 মূল ফিক্স: v3 থেকে v4 করা হয়েছে
      with:
        name: database-backup-${{ env.BACKUP_FILE }}
        path: ${{ env.BACKUP_FILE }}
        retention-days: 30 # ব্যাকআপ ফাইলগুলো ৩০ দিন পর্যন্ত গিটহাবে সেভ থাকবে