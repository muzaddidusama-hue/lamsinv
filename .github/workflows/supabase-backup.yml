name: Supabase Database Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up PostgreSQL client
        run: |
          # Add PostgreSQL repository
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          
          # Install PostgreSQL 17 client (matches your Supabase server version 17.6)
          sudo apt-get install -y postgresql-client-17

      - name: Generate Backup File
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          BACKUP_NAME="lams_power_backup_$DATE.sql"
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" > $BACKUP_NAME
          echo "BACKUP_FILE=$BACKUP_NAME" >> $GITHUB_ENV

      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30 # ব্যাকআপ ফাইলগুলো ৩০ দিন পর্যন্ত গিটহাবে সেভ থাকবে
